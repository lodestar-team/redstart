# Local graph-node stack for the conformance harness (deploy/diff tiers).
#
#   RPC_URL=https://… NETWORK=mainnet docker compose -f conformance/docker-compose.yml up -d
#
# Then, from the repo root:
#   BLOCK=<n> RPC_URL=… ./conformance/run.sh all
#
# Use an archive RPC and a project with a SHORT [startBlock, BLOCK] window —
# indexing a busy contract like USDC from genesis is impractical.

services:
  graph-node:
    image: graphprotocol/graph-node:latest
    ports:
      - "8000:8000" # GraphQL queries
      - "8020:8020" # JSON-RPC admin (deploy)
      - "8030:8030" # subgraph indexing status
    depends_on:
      - ipfs
      - postgres
    environment:
      postgres_host: postgres
      postgres_user: graph-node
      postgres_pass: let-me-in
      postgres_db: graph-node
      ipfs: "ipfs:5001"
      ethereum: "${NETWORK:-mainnet}:${RPC_URL}"
      GRAPH_LOG: info

  ipfs:
    image: ipfs/kubo:latest
    ports:
      - "5001:5001"

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    command:
      ["postgres", "-cshared_preload_libraries=pg_stat_statements"]
    environment:
      POSTGRES_USER: graph-node
      POSTGRES_PASSWORD: let-me-in
      POSTGRES_DB: graph-node
      PGDATA: "/var/lib/postgresql/data"
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
