name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # fmt + clippy + the Rust test suite.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace

  # The eject-path proof: redstart build -> graph codegen -> graph build.
  # Needs only Rust + Node (no Docker / RPC). One job per example so a regression
  # points at the exact subgraph that stopped compiling unmodified.
  conformance:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example: [erc20, factory, file-metadata, horizon-indexer]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: eject-path build
        run: PROJECT=examples/${{ matrix.example }} ./conformance/run.sh build
