name: pages

# Builds the mdBook (and, when present, the playground) and publishes them to
# GitHub Pages. Enable once under Settings -> Pages -> Source: GitHub Actions.

on:
  push:
    branches: [main]
    paths:
      - "docs/book/**"
      - "playground/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest

      - name: Build the book
        run: mdbook build docs/book

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      - name: Build the playground
        run: ./playground/build.sh

      - name: Assemble site
        run: |
          mkdir -p _site/playground
          cp -r docs/book/book/. _site/
          cp playground/index.html playground/app.js playground/style.css _site/playground/
          cp -r playground/pkg _site/playground/pkg

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
