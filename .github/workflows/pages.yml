name: pages

# Builds the mdBook (and, when present, the playground) and publishes them to
# GitHub Pages. Enable once under Settings -> Pages -> Source: GitHub Actions.

on:
  push:
    branches: [main]
    paths:
      - "docs/book/**"
      - "playground/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: latest

      - name: Build the book
        run: mdbook build docs/book

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r docs/book/book/. _site/
          # The playground (if built into playground/dist) is served at /playground.
          if [ -d playground/dist ]; then
            mkdir -p _site/playground
            cp -r playground/dist/. _site/playground/
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
