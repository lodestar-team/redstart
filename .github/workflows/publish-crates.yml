name: publish-crates

# Publishes the workspace crates to crates.io on a tagged release, in dependency
# order. Requires a CARGO_REGISTRY_TOKEN secret (crates.io API token). Skips
# cleanly until that secret is set, so tagging never fails on this account.
#
# Publishing is irreversible (a version can be yanked but not replaced), so this
# only runs on tags — never on push.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Package + verify only, do not upload"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Check token
        id: cfg
        env:
          TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CARGO_REGISTRY_TOKEN not set — running a dry-run only."
          fi

      # cargo publish waits for each crate to land in the index before returning,
      # so publishing in dependency order in one job is safe.
      - name: Publish (or dry-run) in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          FORCE_DRY: ${{ steps.cfg.outputs.enabled == 'false' || inputs.dry_run == true }}
        run: |
          set -euo pipefail
          CRATES="redstart-parser redstart-loader redstart-checker redstart-codegen redstart-test redstart-lsp redstart-mcp redstart-cli"
          if [ "$FORCE_DRY" = "true" ]; then
            # Without a token we can't publish. A full dry-run can't work either:
            # cargo resolves each crate's deps against crates.io, and the
            # downstream crates depend on upstream versions that aren't published
            # yet. So validate packaging of the leaf crate (no internal deps) as a
            # smoke test; the ordered publish below is exercised only for real.
            echo "::notice::No CARGO_REGISTRY_TOKEN — dry-running the leaf crate only."
            echo "::group::dry-run redstart-parser"
            cargo publish -p redstart-parser --dry-run
            echo "::endgroup::"
            exit 0
          fi
          # Real publish: cargo waits for each crate to land in the index before
          # returning, so publishing in dependency order in one job is safe.
          for crate in $CRATES; do
            echo "::group::publish $crate"
            cargo publish -p "$crate"
            echo "::endgroup::"
          done
