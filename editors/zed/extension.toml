id = "redstart"
name = "Redstart"
version = "0.1.0"
schema_version = 1
authors = ["The Lodestar Team"]
description = "Redstart language support — The Graph subgraphs: syntax highlighting (tree-sitter) + LSP."
repository = "https://github.com/lodestar-team/redstart"

[grammars.redstart]
repository = "https://github.com/lodestar-team/redstart"
# The tree-sitter grammar lives in a subdirectory of the main repo.
path = "tree-sitter-redstart"
# Pin to the commit that contains the generated grammar (filled on release).
commit = "REPLACE_WITH_COMMIT_SHA"

[language_servers.redstart]
name = "Redstart"
languages = ["Redstart"]
